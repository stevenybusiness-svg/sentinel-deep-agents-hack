service {
    proto-fd-max 1024
}

logging {
    console {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }
    heartbeat {
        mode mesh
        port 3002
        interval 150
        timeout 10
    }
    fabric {
        port 3001
    }
    info {
        port 3003
    }
}

namespace sentinel {
    replication-factor 1
    memory-size 256M
    default-ttl 0
    storage-engine device {
        file /opt/aerospike/data/sentinel.dat
        filesize 1G
    }
}
