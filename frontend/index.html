<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel</title>

    <!-- Fonts: Inter (display) + Roboto Mono + Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN v3 (not v4) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary":      "#57abff",
              "accent":       "#57abff",
              "cyber":        "#00d4aa",
              "success":      "#3fb950",
              "danger":       "#f85149",
              "warning":      "#e3b341",
              "bg-dark":      "#0d1117",
              "surface":      "#161b22",
              "border-muted": "#30363d",
              "text-main":    "#c9d1d9",
              "text-muted":   "#8b949e",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"],
              "mono":    ["Roboto Mono", "SFMono-Regular", "Menlo", "monospace"],
            },
          },
        },
      }
    </script>

    <style>
      /* Card slide-in for dynamically appended items */
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .card-enter { animation: slideIn 0.25s ease-out; }

      /* Pulsing indicator dot */
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      /* Orange pulse for rule nodes -- self-improvement visual (PHASE8-03) */
      @keyframes rule-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(227, 179, 65, 0.7); }
        50%       { box-shadow: 0 0 0 8px rgba(227, 179, 65, 0); }
      }
      .rule-pulse { animation: rule-pulse 1.5s ease-in-out infinite; }

      /* Dramatic entrance for newly deployed rules — glow burst + scale */
      @keyframes rule-deploy {
        0%   { transform: scale(0.7); opacity: 0; box-shadow: 0 0 0 0 rgba(227, 179, 65, 0); }
        40%  { transform: scale(1.08); opacity: 1; box-shadow: 0 0 24px 8px rgba(227, 179, 65, 0.6); }
        70%  { transform: scale(0.97); box-shadow: 0 0 12px 4px rgba(227, 179, 65, 0.3); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(227, 179, 65, 0.7); }
      }
      .rule-deploy { animation: rule-deploy 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), rule-pulse 1.5s ease-in-out 0.6s infinite; }

      /* Brighter evolving pulse when system is learning / generating new rule */
      @keyframes rule-evolving {
        0%, 100% { box-shadow: 0 0 4px 2px rgba(227, 179, 65, 0.4); filter: brightness(1); }
        50%      { box-shadow: 0 0 16px 6px rgba(227, 179, 65, 0.7); filter: brightness(1.3); }
      }
      .rule-evolving { animation: rule-evolving 0.8s ease-in-out infinite; }

      /* Grayed-out dormant state for findings not yet active */
      .node-dormant { opacity: 0.4; filter: grayscale(0.6); transition: opacity 0.5s, filter 0.5s; }
      .node-dormant:hover { opacity: 0.7; }

      /* Smooth node activation — fade and slide up */
      @keyframes node-activate {
        from { opacity: 0.4; filter: grayscale(0.6); transform: translateY(4px); }
        to   { opacity: 1; filter: grayscale(0); transform: translateY(0); }
      }
      .node-activate { animation: node-activate 0.4s ease-out forwards; }

      /* Shake animation for compromised agent */
      @keyframes node-shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
        20%, 40%, 60%, 80% { transform: translateX(4px); }
      }
      .node-shake { animation: node-shake 2.5s ease-in-out; }

      /* Red pulse for compromised agent */
      @keyframes compromised-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.6); }
        50%       { box-shadow: 0 0 0 10px rgba(248, 81, 73, 0); }
      }
      .compromised-pulse { animation: node-shake 2.5s ease-in-out, compromised-pulse 2s ease-in-out infinite 2.5s; }

      /* Floating card animation for landing page */
      @keyframes float-card {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(-8px); }
      }
      .float-card { animation: float-card 4s ease-in-out infinite; }

      /* Scan line overlay */
      @keyframes scan-line {
        0%   { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      .scan-line-overlay {
        background: linear-gradient(transparent 40%, rgba(0,212,170,0.08) 50%, transparent 60%);
        animation: scan-line 3s ease-in-out infinite;
      }

      /* Auth screen spin */
      @keyframes auth-spin {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .auth-spin { animation: auth-spin 3s linear infinite; }

      /* Tab active underline */
      .tab-active { border-bottom: 2px solid #00d4aa; color: #00d4aa; }

      /* Hide React Flow attribution watermark */
      .react-flow__attribution { display: none !important; }
    </style>
  </head>
  <body class="bg-bg-dark text-text-main font-display antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
