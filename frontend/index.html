<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel</title>

    <!-- Fonts: Inter (display) + Roboto Mono + Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN v3 (not v4) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary":      "#57abff",
              "success":      "#3fb950",
              "danger":       "#f85149",
              "warning":      "#e3b341",
              "bg-dark":      "#0d1117",
              "surface":      "#161b22",
              "border-muted": "#30363d",
              "text-main":    "#c9d1d9",
              "text-muted":   "#8b949e",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"],
              "mono":    ["Roboto Mono", "SFMono-Regular", "Menlo", "monospace"],
            },
          },
        },
      }
    </script>

    <style>
      /* Card slide-in for dynamically appended items */
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .card-enter { animation: slideIn 0.25s ease-out; }

      /* Pulsing indicator dot */
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>
  <body class="bg-bg-dark text-text-main font-display antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
